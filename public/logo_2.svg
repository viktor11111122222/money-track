<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1225"></stop>
      <stop offset="100%" stop-color="#1a1a3e"></stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4a6cf7"></stop><stop offset="100%" stop-color="#6b8aff"></stop>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6360e8"></stop><stop offset="100%" stop-color="#8480ff"></stop>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7c54da"></stop><stop offset="100%" stop-color="#9e78f0"></stop>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#a83ad0"></stop><stop offset="100%" stop-color="#c45ee8"></stop>
    </linearGradient>
    <radialGradient id="dotGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff"></stop><stop offset="100%" stop-color="#d4b0ff"></stop>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"></feDropShadow>
    </filter>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"></rect>
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="100" y1="180" x2="412" y2="180"></line>
    <line x1="100" y1="230" x2="412" y2="230"></line>
    <line x1="100" y1="280" x2="412" y2="280"></line>
    <line x1="100" y1="330" x2="412" y2="330"></line>
  </g>
  <rect x="108" y="290" width="56" height="90" rx="8" ry="8" fill="url(#bar1)"></rect>
  <rect x="188" y="230" width="56" height="150" rx="8" ry="8" fill="url(#bar2)"></rect>
  <rect x="268" y="190" width="56" height="190" rx="8" ry="8" fill="url(#bar3)"></rect>
  <rect x="348" y="140" width="56" height="240" rx="8" ry="8" fill="url(#bar4)"></rect>
  <rect x="90" y="388" width="332" height="4" rx="2" ry="2" fill="#ffffff" opacity="0.9"></rect>
  <polyline points="136,278 216,218 296,178 376,128" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)" opacity="0.9"></polyline>
  <circle cx="376" cy="128" r="10" fill="url(#dotGrad)"></circle>
  <circle cx="376" cy="128" r="14" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"></circle>
</svg>