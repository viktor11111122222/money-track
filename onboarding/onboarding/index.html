<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Welcome – Money Tracker</title>
  <link rel="stylesheet" href="/public/fontawesome/css/all.min.css">
  <script src="/public/theme-init.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100vh;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e6eef8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px env(safe-area-inset-bottom);
      overflow-x: hidden;
    }

    /* Background gradient blobs */
    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -80px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -60px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .onboarding-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px 28px 28px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent, #6366f1), var(--accent-grad, #06b6d4));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .logo h2 { font-size: 1.1rem; font-weight: 700; color: #fff; }

    /* Step indicator */
    .steps {
      display: flex;
      gap: 6px;
      margin-bottom: 28px;
    }
    .step-dot {
      height: 4px;
      border-radius: 2px;
      flex: 1;
      background: rgba(255,255,255,0.12);
      transition: background 0.3s;
    }
    .step-dot.active {
      background: var(--accent, #6366f1);
    }
    .step-dot.done {
      background: rgba(99,102,241,0.45);
    }

    /* Step content */
    .step { display: none; }
    .step.visible { display: block; }

    .step-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .step-subtitle {
      font-size: 0.85rem;
      color: rgba(230,238,248,0.55);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* Form fields */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(230,238,248,0.6);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input, select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      color: #e6eef8;
      font-size: 0.95rem;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--accent, #6366f1);
    }
    input::placeholder { color: rgba(230,238,248,0.3); }

    /* Income row */
    .income-row {
      display: flex;
      gap: 10px;
    }
    .income-row select { width: 90px; flex-shrink: 0; }
    .income-row input { flex: 1; }

    /* Language options */
    .lang-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .lang-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .lang-option.selected {
      border-color: var(--accent, #6366f1);
      background: rgba(99,102,241,0.12);
    }
    .lang-option .flag { font-size: 1.4rem; }
    .lang-option .lang-name { font-size: 0.95rem; font-weight: 600; color: #e6eef8; }
    .lang-option .lang-native { font-size: 0.78rem; color: rgba(230,238,248,0.45); }
    .lang-option input[type="radio"] { display: none; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }
    .btn-back {
      flex: 0 0 48px;
      height: 48px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #e6eef8;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-next {
      flex: 1;
      height: 48px;
      background: linear-gradient(135deg, var(--accent, #6366f1), var(--accent-grad, #06b6d4));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
      transition: opacity 0.2s;
    }
    .btn-next:active { opacity: 0.85; }

    /* Skip */
    .skip-link {
      text-align: center;
      margin-top: 16px;
      font-size: 0.8rem;
      color: rgba(230,238,248,0.35);
      cursor: pointer;
    }
    .skip-link:hover { color: rgba(230,238,248,0.6); }

    /* Error */
    .field-error {
      font-size: 0.75rem;
      color: #f87171;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="onboarding-card">

  <div class="logo">
    <div class="logo-icon"><i class="fas fa-wallet" style="color:#fff"></i></div>
    <h2>Money Tracker</h2>
  </div>

  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- Step 1: Profile -->
  <div class="step visible" id="step1">
    <div class="step-title">Welcome!</div>
    <div class="step-subtitle">Let's set up your account. This info is stored only on your device.</div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="ob-name" placeholder="e.g. Viktor Djordjevic" autocomplete="name">
      <div class="field-error" id="err-name"></div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="ob-email" placeholder="you@example.com" autocomplete="email">
      <div class="field-error" id="err-email"></div>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="ob-username" placeholder="e.g. viktor99" autocomplete="username">
      <div class="field-error" id="err-username"></div>
    </div>

    <div class="btn-row">
      <button class="btn-next" onclick="goStep2()">Continue <i class="fas fa-arrow-right"></i></button>
    </div>
    <div class="skip-link" onclick="skipOnboarding()">Skip for now</div>
  </div>

  <!-- Step 2: Income -->
  <div class="step" id="step2">
    <div class="step-title">Monthly Income</div>
    <div class="step-subtitle">How much do you earn per month? Used to track your budget balance.</div>

    <div class="field">
      <label>Income Amount</label>
      <div class="income-row">
        <select id="ob-currency">
          <option value="EUR">€ EUR</option>
          <option value="USD">$ USD</option>
          <option value="RSD">RSD</option>
          <option value="GBP">£ GBP</option>
          <option value="CHF">CHF</option>
          <option value="BAM">BAM</option>
          <option value="HRK">HRK</option>
        </select>
        <input type="number" id="ob-income" placeholder="0" min="0" inputmode="decimal">
      </div>
      <div class="field-error" id="err-income"></div>
    </div>

    <div class="btn-row">
      <button class="btn-back" onclick="goStep(1)"><i class="fas fa-arrow-left"></i></button>
      <button class="btn-next" onclick="goStep3()">Continue <i class="fas fa-arrow-right"></i></button>
    </div>
    <div class="skip-link" onclick="skipOnboarding()">Skip for now</div>
  </div>

  <!-- Step 3: Language -->
  <div class="step" id="step3">
    <div class="step-title">Choose Language</div>
    <div class="step-subtitle">You can change this later in Settings.</div>

    <div class="lang-options">
      <label class="lang-option selected" id="lang-English">
        <input type="radio" name="lang" value="English" checked>
        <span class="flag">🇬🇧</span>
        <div><div class="lang-name">English</div><div class="lang-native">English</div></div>
      </label>
      <label class="lang-option" id="lang-Serbian">
        <input type="radio" name="lang" value="Serbian">
        <span class="flag">🇷🇸</span>
        <div><div class="lang-name">Serbian</div><div class="lang-native">Srpski</div></div>
      </label>
      <label class="lang-option" id="lang-Spanish">
        <input type="radio" name="lang" value="Spanish">
        <span class="flag">🇪🇸</span>
        <div><div class="lang-name">Spanish</div><div class="lang-native">Español</div></div>
      </label>
    </div>

    <div class="btn-row">
      <button class="btn-back" onclick="goStep(2)"><i class="fas fa-arrow-left"></i></button>
      <button class="btn-next" onclick="finish()">Get Started <i class="fas fa-check"></i></button>
    </div>
  </div>

</div>

<script>
  var STORAGE_KEY = 'mt_settings_v1';
  var APP_DATA_KEY = 'moneyTrackerData';
  var ONBOARDING_KEY = 'mt_onboarding_done';

  // Lang option click
  document.querySelectorAll('.lang-option').forEach(function(el) {
    el.addEventListener('click', function() {
      document.querySelectorAll('.lang-option').forEach(function(e) { e.classList.remove('selected'); });
      el.classList.add('selected');
      el.querySelector('input[type="radio"]').checked = true;
    });
  });

  function goStep(n) {
    document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('visible'); });
    document.getElementById('step' + n).classList.add('visible');
    ['dot1','dot2','dot3'].forEach(function(id, i) {
      var dot = document.getElementById(id);
      dot.classList.remove('active','done');
      if (i + 1 < n) dot.classList.add('done');
      else if (i + 1 === n) dot.classList.add('active');
    });
  }

  function goStep2() {
    var name = document.getElementById('ob-name').value.trim();
    var email = document.getElementById('ob-email').value.trim();
    var username = document.getElementById('ob-username').value.trim();
    var ok = true;
    document.getElementById('err-name').textContent = '';
    document.getElementById('err-email').textContent = '';
    document.getElementById('err-username').textContent = '';
    if (!name) { document.getElementById('err-name').textContent = 'Name is required'; ok = false; }
    if (!email || !email.includes('@')) { document.getElementById('err-email').textContent = 'Valid email is required'; ok = false; }
    if (!username) { document.getElementById('err-username').textContent = 'Username is required'; ok = false; }
    if (ok) goStep(2);
  }

  function goStep3() {
    goStep(3);
  }

  function finish() {
    saveAndProceed();
  }

  function skipOnboarding() {
    localStorage.setItem(ONBOARDING_KEY, 'true');
    window.location.href = '/dashboard/index.html';
  }

  function saveAndProceed() {
    var name = document.getElementById('ob-name').value.trim();
    var email = document.getElementById('ob-email').value.trim();
    var username = document.getElementById('ob-username').value.trim();
    var income = parseFloat(document.getElementById('ob-income').value) || 0;
    var currency = document.getElementById('ob-currency').value;
    var lang = document.querySelector('input[name="lang"]:checked').value;

    // Load or create settings
    var settings;
    try { settings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { settings = {}; }
    if (!settings.profile) settings.profile = {};
    if (!settings.preferences) settings.preferences = {};

    settings.profile.fullName = name;
    settings.profile.email = email;
    settings.profile.username = username;
    settings.preferences.language = lang;
    settings.preferences.currency = currency;
    settings.preferences.monthlyIncome = income;

    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));

    // Also save income to app data
    var appData;
    try { appData = JSON.parse(localStorage.getItem(APP_DATA_KEY)) || {}; } catch(e) { appData = {}; }
    appData.income = income;
    localStorage.setItem(APP_DATA_KEY, JSON.stringify(appData));

    localStorage.setItem(ONBOARDING_KEY, 'true');
    window.location.href = '/dashboard/index.html';
  }
</script>
</body>
</html>
