<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Dev Reset</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0f1724;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, sans-serif;
            padding: 24px;
            gap: 16px;
        }
        .icon { font-size: 48px; }
        h1 { color: #e2e8f0; font-size: 20px; font-weight: 700; }
        p { color: #64748b; font-size: 14px; text-align: center; max-width: 280px; line-height: 1.5; }
        .btn {
            width: 100%;
            max-width: 320px;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.15s;
        }
        .btn:active { opacity: 0.8; }
        .btn-reset {
            background: #6366f1;
            color: #fff;
        }
        .btn-cancel {
            background: rgba(255,255,255,0.07);
            color: #94a3b8;
            font-size: 14px;
            padding: 12px;
        }
        .done { color: #10b981; font-size: 15px; font-weight: 600; display: none; }
    </style>
</head>
<body>
    <div class="icon">🔄</div>
    <h1>Reset App</h1>
    <p>Obrisaće sve podatke, nalog i podešavanja — kao da si prvi put skinuo app.</p>
    <button class="btn btn-reset" id="resetBtn">Resetuj sve i idi na onboarding</button>
    <button class="btn btn-cancel" onclick="history.back()">← Nazad</button>
    <p class="done" id="doneMsg">✓ Resetovano! Preusmeravam...</p>

    <script>
        document.getElementById('resetBtn').addEventListener('click', function() {
            this.disabled = true;
            this.textContent = 'Brišem...';

            localStorage.clear();
            sessionStorage.clear();

            document.getElementById('doneMsg').style.display = 'block';

            setTimeout(function() {
                window.location.href = '/shared/index.html';
            }, 800);
        });
    </script>
</body>
</html>
